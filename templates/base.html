<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Sports Event Calendar{% endblock %}</title>
    <style>
      :root {
        --bg: #f6f7fb;
        --card: #ffffff;
        --border: #d9dce7;
        --text: #1f2430;
        --muted: #5f6677;
        --accent: #0f6fbf;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .nav {
        background: var(--card);
        border-bottom: 1px solid var(--border);
      }
      .nav-inner, .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 16px;
      }
      .nav-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 56px;
      }
      .brand {
        font-weight: 700;
      }
      .links a {
        color: var(--muted);
        text-decoration: none;
        margin-left: 16px;
      }
      .links a:hover, .links a.active {
        color: var(--accent);
      }
      .container {
        padding-top: 24px;
        padding-bottom: 24px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }
      .warning {
        margin-bottom: 14px;
        padding: 10px 12px;
        border: 1px solid #f2d28a;
        background: #fff7de;
        color: #6d5305;
        border-radius: 8px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }
      th {
        font-size: 13px;
        color: var(--muted);
      }
      .small {
        color: var(--muted);
        font-size: 13px;
      }
      @media (max-width: 900px) {
        .links a {
          margin-left: 10px;
          font-size: 14px;
        }
        table {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="nav">
      <div class="nav-inner">
        <div class="brand">Sports Event Calendar</div>
        <div class="links">
          <a href="{{ url_for('list_events') }}" class="active">Events</a>
          <a href="#">Event Detail (placeholder)</a>
          <a href="#">Add Event (placeholder)</a>
        </div>
      </div>
    </nav>

    <main class="container">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
